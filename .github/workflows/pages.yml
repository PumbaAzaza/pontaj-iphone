name: PublicДѓ aplicaИ›ia

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Preia sursa
        uses: actions/checkout@v4
      - name: ConfigureazДѓ pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - name: ConfigureazДѓ Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: InstaleazДѓ dependenИ›ele
        run: pnpm install --frozen-lockfile
      - name: ConstruieИ™te aplicaИ›ia
        run: pnpm build
        env:
          NEXT_PUBLIC_BASE_PATH: /pontaj-iphone
      - name: ConfigureazДѓ GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: ГЋncarcДѓ aplicaИ›ia
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: PublicДѓ
        id: deployment
        uses: actions/deploy-pages@v4

