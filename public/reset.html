<!doctype html><html lang="ro"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Actualizare WorkHours</title><style>body{font-family:-apple-system,sans-serif;background:#f3f5f7;margin:0;display:grid;place-items:center;min-height:100vh;color:#17202a}.box{background:#fff;padding:28px;border-radius:20px;max-width:320px;text-align:center;box-shadow:0 12px 35px #0001}.ok{color:#126b5a;font-weight:800}</style><div class="box"><h2>Actualizare WorkHours</h2><p id="msg">Șterg versiunea veche…</p></div><script>(async()=>{try{if('serviceWorker'in navigator){for(const r of await navigator.serviceWorker.getRegistrations())await r.unregister()}if('caches'in window){for(const k of await caches.keys())await caches.delete(k)}document.getElementById('msg').innerHTML='<span class="ok">Gata.</span> Deschid versiunea nouă…';setTimeout(()=>location.replace('./?fresh='+Date.now()),900)}catch(e){location.replace('./?fresh='+Date.now())}})()</script></html>
